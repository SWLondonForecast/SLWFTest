<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWLondon Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1428, #1e2a44);
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* Stronger Liquid Glass */
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.4s ease;
    }

    .glass:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    header { text-align: center; padding: 3rem 0 2rem; }
    h1 { 
      font-size: 3rem; 
      background: linear-gradient(to right, #60a5fa, #a5b4fc); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }

    /* Status */
    .status-section {
      padding: 18px 24px;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Heat Warning */
    .heat-warning {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(250, 204, 21, 0.95);
      color: #1e2937;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 260px;
      z-index: 100;
      border-left: 6px solid #ca8a04;
    }

    /* Warnings */
    .warnings { margin: 1.5rem 0; display: flex; flex-direction: column; gap: 12px; }
    .warning { padding: 16px 20px; border-radius: 16px; font-weight: 600; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
    .yellow { background: #facc15; color: #1e2937; }
    .amber { background: #f59e0b; color: #1e2937; }
    .red { background: #ef4444; color: white; }

    .tabs { display: flex; justify-content: center; gap: 15px; margin: 2rem 0; }
    .tab-btn {
      padding: 14px 40px;
      font-size: 1.2rem;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .tab-btn.active { 
      background: rgba(59, 130, 246, 0.75); 
      border-color: #60a5fa; 
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
    }

    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .weather-card {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.3s ease;
    }
    .weather-card:hover { transform: translateY(-8px); }

    .temp { font-size: 4.5rem; font-weight: 700; line-height: 1; }
    .location { font-size: 1.3rem; margin-top: 8px; opacity: 0.9; }

    .radar-section { margin: 3rem 0; text-align: center; }
    iframe {
      width: 100%;
      max-width: 1000px;
      height: 520px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .last-updated { text-align: center; margin: 25px 0; opacity: 0.7; }
  </style>
</head>
<body>
  <header>
    <div class="container glass">
      <h1>SWLondon Forecast</h1>
      <p>Somerset & London Weather</p>
    </div>
  </header>

  <main class="container">
    <!-- Heat Warning -->
    <div class="heat-warning glass">
      <strong>🔥 HEAT WARNING</strong><br>
      Please wear sunscreen, hats, sunglasses.<br>
      Drink plenty of WATER!
    </div>

    <!-- Status -->
    <div class="status-section glass">
      <h2>🌐 Website Current Status</h2>
      <iframe src="https://swlforecast.betteruptime.com/badge?theme=dark" 
              width="250" height="30" frameborder="0" scrolling="no" 
              style="color-scheme: normal; border-radius: 8px;">
      </iframe>
    </div>

    <!-- Warnings -->
    <div class="warnings" id="warnings"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-section="london">🌆 London Area</button>
      <button class="tab-btn" data-section="somerset">🌳 Somerset</button>
    </div>

    <!-- Places -->
    <div id="places-grid" class="places-grid"></div>

    <!-- Radar -->
    <div class="radar-section">
      <h2>🌧️ Live Rainfall Radar (UK)</h2>
      <iframe src="https://www.rainviewer.com/map.html?loc=51.5,-0.1,8" allowfullscreen></iframe>
    </div>

    <p id="last-updated" class="last-updated">Last updated: just now</p>
  </main>

  <footer style="text-align:center; padding:3rem 0; opacity:0.6;">
    Data from Open-Meteo • Auto-updates every 15 minutes
  </footer>

  <script>
    // Same script as before
    const warningsConfig = [
      { type: "yellow", title: "Yellow Warning", desc: "Yellow Warning Enforced In the UK", visible: true },
      { type: "amber", title: "Amber Warning", desc: "Threat to life and Environment", visible: false },
      { type: "red", title: "Red Warning", desc: "Danger to Life and Environment", visible: false }
    ];

    function renderWarnings() {
      const container = document.getElementById('warnings');
      container.innerHTML = '';
      warningsConfig.filter(w => w.visible).forEach(w => {
        const div = document.createElement('div');
        div.className = `warning glass ${w.type}`;
        div.innerHTML = `<strong>${w.title}</strong> — ${w.desc}`;
        container.appendChild(div);
      });
    }

    const allPlaces = {
      london: [
        { id: "london", name: "London (Central)", lat: 51.5074, lon: -0.1278 },
        { id: "hyde", name: "Hyde Park", lat: 51.5073, lon: -0.1657 },
        { id: "westminster", name: "Westminster", lat: 51.4994, lon: -0.1245 },
        { id: "swindon", name: "Swindon", lat: 51.5558, lon: -1.7798 }
      ],
      somerset: [
        { id: "taunton", name: "Taunton", lat: 51.019, lon: -3.100 },
        { id: "yeovil", name: "Yeovil", lat: 50.9416, lon: -2.6323 },
        { id: "ilminster", name: "Ilminster", lat: 50.927, lon: -2.910 },
        { id: "crewkerne", name: "Crewkerne", lat: 50.883, lon: -2.795 },
        { id: "shepton", name: "Shepton Mallet", lat: 51.192, lon: -2.546 }
      ]
    };

    async function fetchPlaceWeather(place) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${place.lat}&longitude=${place.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m&timezone=auto`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        return {
          temp: Math.round(data.current.temperature_2m),
          feels: Math.round(data.current.apparent_temperature),
          humidity: data.current.relative_humidity_2m,
          wind: Math.round(data.current.wind_speed_10m)
        };
      } catch(e) { return null; }
    }

    async function renderSection(section) {
      const grid = document.getElementById('places-grid');
      grid.innerHTML = '';
      for (const place of allPlaces[section]) {
        const weather = await fetchPlaceWeather(place);
        const card = document.createElement('div');
        card.className = 'weather-card glass';
        card.innerHTML = `
          <div>
            <div class="temp">${weather ? weather.temp : '--'}°C</div>
            <div class="location">${place.name}</div>
          </div>
          <div class="details" style="text-align:right; line-height:1.7;">
            ${weather ? `Feels like: ${weather.feels}°C<br>Humidity: ${weather.humidity}%<br>Wind: ${weather.wind} km/h` : 'Loading...'}
          </div>
        `;
        grid.appendChild(card);
      }
      document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSection(btn.dataset.section);
      });
    });

    renderWarnings();
    renderSection('london');

    setInterval(() => {
      const active = document.querySelector('.tab-btn.active').dataset.section;
      renderSection(active);
    }, 15 * 60 * 1000);
  </script>
</body>
</html>
